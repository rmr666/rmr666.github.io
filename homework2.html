<body>
    <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播放器图标作业</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #4b2e68 0%, #b87ea1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .player-card {
            width: 300px;
            height: 300px;
            background: #7a4b7a;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .player-frame {
            width: 220px;
            height: 160px;
            background: #221825;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-bg {
            width: 180px;
            height: 120px;
            background: linear-gradient(135deg, #ffb89a 0%, #a8566a 100%);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-circle {
            width: 80px;
            height: 80px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .play-triangle {
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-left: 30px solid #221825;
        }
    </style>
</head>
<body>
    <div class="player-card">
        <div class="player-frame">
            <div class="btn-bg">
                <div class="btn-circle">
                    <div class="play-triangle"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
</body>
</html>
