<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网上书城 - 注册新用户</title>
    <style>
        body {
            background: #ccc;
            font-size: 12px;
        }
        .box {
            width: 400px;
            margin: 50px auto;
            border: 2px solid #fff;
            background: #ddd;
        }
        .title-top {
            background: #444;
            color: #fff;
            text-align: center;
            padding: 8px;
            font-size: 16px;
        }
        .sub-title {
            background: #eee;
            padding: 6px 10px;
            border-bottom: 1px solid #999;
        }
        table {
            margin: 20px auto;
        }
        td {
            padding: 6px 4px;
        }
        input {
            width: 180px;
            padding: 2px;
        }
        .submit-btn {
            width: 186px;
            background: #333;
            color: #fff;
            border: none;
            padding: 4px;
        }
    </style>
</head>
<body>
    <div class="box">
        <!-- 顶部标题 -->
        <div class="title-top">网上书城</div>
        <!-- 子标题 -->
        <div class="sub-title">✚ 注册新用户</div>
        <!-- 注册表单 -->
        <form action="#" method="post">
            <table>
                <tr>
                    <td>👤 用户名</td>
                    <td><input type="text" name="username"></td>
                </tr>
                <tr>
                    <td>🔐 密码</td>
                    <td><input type="password" name="pwd"></td>
                </tr>
                <tr>
                    <td>🔐 确认密码</td>
                    <td><input type="password" name="repwd"></td>
                </tr>
                <tr>
                    <td>📂 电子邮件</td>
                    <td><input type="email" name="email"></td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input class="submit-btn" type="submit" value="注册新用户">
                    </td>
                </tr>
            </table>
        </form>
    </div>
</body>
</html>
